<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" style="image-rendering:pixelated">
  <!-- dark background -->
  <rect width="16" height="16" fill="#1a1a2e"/>
  <!-- bubble outline (solid rect, then fill punched out on top) -->
  <rect x="1" y="1" width="13" height="8" fill="#a0a0ff"/>
  <!-- bubble fill -->
  <rect x="2" y="2" width="11" height="6" fill="#e8e8ff"/>
  <!-- text line 1 (longer) -->
  <rect x="3" y="4" width="7" height="1" fill="#7070cc"/>
  <!-- text line 2 (shorter) -->
  <rect x="3" y="6" width="5" height="1" fill="#7070cc"/>
  <!-- tail — diagonal steps going down-left -->
  <rect x="3" y="9" width="1" height="1" fill="#a0a0ff"/>
  <rect x="2" y="10" width="1" height="1" fill="#a0a0ff"/>
  <rect x="1" y="11" width="1" height="1" fill="#a0a0ff"/>
</svg>
